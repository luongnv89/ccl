# gitissue configuration
# Generated by /init-gitissue
# Detected: Python | None | pytest | small repo (69 files)

# Platform for issue management
# Values: "github" | "gitlab"
platform: github

# Issue creation and normalization settings
issue:
  # Auto-normalize issues in /issue-resolver before resolution
  auto_normalize: true

  # Issue template source
  # Values: "default" | path to custom template directory
  # Note: .github/ISSUE_TEMPLATE/ found (2 templates)
  # Set template to ".github/ISSUE_TEMPLATE" to use your existing templates
  template: default

  # Auto-suggest labels based on issue content and type
  labels_auto_suggest: true

  # Post a comment when normalizing an issue
  normalize_comment: true

# Resolution pipeline settings
resolve:
  # Approval gate for the plan phase
  # Values: "auto" | "comment-and-wait"
  approval_gate: auto

  # Branch naming prefix
  # "auto" uses type-based prefixes: fix/, feat/, refactor/, docs/, test/, chore/
  # Branch format: {type}/{issue_number}-{short-description}
  # Examples: fix/42-mobile-auth-redirect, feat/15-add-dark-mode
  # Set a custom string (e.g., "issue-") to override type-based naming
  branch_prefix: "auto"

  # Run tests before creating PR
  auto_test: true

  # Abort verify phase after N seconds
  # Range: 30-3600
  test_timeout: 60

  # Include "Closes #N" in PR body for auto-close on merge
  pr_auto_link: true

  # Warn if resolve produces more than N commits
  max_commits: 10

# Triage settings
triage:
  # Flag issues with no activity beyond this threshold (days)
  stale_threshold_days: 7

  # Suggest priorities based on type, age, and dependency position
  auto_priority: true

  # Include recently closed issues in triage analysis
  include_closed: false

  # Max seconds to scan codebase per issue for file dependencies
  scan_timeout_per_issue: 30

# PR review settings (used by /issue-pr-review and /auto-pilot)
review:
  # Run per-criterion acceptance-criteria verification against the linked issue.
  # Default: true — any `fail` criterion blocks soft-pass even on green tests.
  # Set to false to skip the check (acceptance_criteria reported as `pass`).
  require_acceptance_criteria_check: true

  # Run the four traceability checks (Closes #N, commit ref, Decision Record,
  # Acceptance Criteria Verification block) against the PR body and commits.
  # Default: true — missing `Closes #N` blocks soft-pass even on green tests.
  # Set to false to skip the check (traceability reported as `pass`).
  require_traceability_check: true

  # PR labels that exempt a PR from the `Closes #N` hard-fail (check 1 only;
  # the other three traceability checks still run).
  # Default: ["refactor", "chore"] — refactor/chore PRs are exempt by default.
  # Set to [] to disable label-based exemption.
  traceability_exempt_labels:
    - refactor
    - chore

  # Regex matched against the PR body (multiline-anchored, case-insensitive).
  # When the body contains a matching line, the PR is exempt from the
  # `Closes #N` hard-fail (check 1 only).
  # Default: "^\\s*Type:\\s*(refactor|chore)\\s*$" — recognizes a `Type: refactor`
  # or `Type: chore` line anywhere in the PR body.
  # Set to "" to disable pattern-based exemption.
  traceability_exempt_pattern: "^\\s*Type:\\s*(refactor|chore)\\s*$"

# Auto-pilot settings (used by /auto-pilot)
autopilot:
  # Merge mode — controls when /auto-pilot is allowed to merge PRs.
  # Values: "conservative" | "balanced" | "aggressive"
  # Default: "conservative" — create PR, run review-fix cycles, leave PR open.
  #   Never auto-merges. Safest default; recommended for most projects.
  # "balanced":     auto-merge clean PRs (review passed). PRs with unresolved
  #                 review issues get a follow-up issue and stay open.
  # "aggressive":   auto-merge clean PRs AND merge partial PRs when
  #                 merge_partial=true is also set (see below). Risky —
  #                 only enable on disposable/experimental repos.
  mode: conservative

  # Allow merging PRs that still have unresolved fixable review issues.
  # Default: false — never merge a partial PR.
  # Only honored when mode is "aggressive". With any other mode this
  # field is ignored. Combined opt-in (mode=aggressive AND merge_partial=true)
  # is required to reach the prior 2.1.x "merge anyway with follow-up" path.
  merge_partial: false

# Issue analysis settings
analysis:
  # Max files to read during deep analysis (5-100)
  max_files: 30

  # How many levels of import dependencies to trace (1-5)
  trace_depth: 3

  # Max seconds for the full codebase scan phase (30-600)
  scan_timeout: 120
