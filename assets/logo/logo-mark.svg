<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square background (Codex-style) -->
  <rect width="64" height="64" rx="14" fill="#111111"/>

  <!-- Claude starburst rays (8 rays radiating from center, muted) -->
  <!-- Rays at 0°, 45°, 90°, 135°, 180°, 225°, 270°, 315° -->
  <!-- Center: 32,32 — rays from r=10 to r=26 -->
  <line x1="32" y1="6"  x2="32" y2="18" stroke="#A1A1A1" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="58" stroke="#A1A1A1" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="18" y2="32" stroke="#A1A1A1" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="58" y2="32" stroke="#A1A1A1" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Diagonal rays -->
  <line x1="13.5" y1="13.5" x2="21.9" y2="21.9" stroke="#A1A1A1" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="42.1" y1="42.1" x2="50.5" y2="50.5" stroke="#A1A1A1" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="50.5" y1="13.5" x2="42.1" y2="21.9" stroke="#A1A1A1" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="13.5" y1="50.5" x2="21.9" y2="42.1" stroke="#A1A1A1" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Codex >_ prompt (neon green, centered, on top of rays) -->
  <!-- ">" chevron -->
  <path d="M22,27 L28,32 L22,37" stroke="#00FF41" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- "_" cursor -->
  <line x1="31" y1="37" x2="39" y2="37" stroke="#00FF41" stroke-width="2.8" stroke-linecap="round"/>
</svg>
